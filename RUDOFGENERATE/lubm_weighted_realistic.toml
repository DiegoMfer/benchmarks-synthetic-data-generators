# LUBM Configuration: Weighted Realistic Distribution
# Purpose: Mimic real university structure with realistic proportions
#          Expected MEDIUM-HIGH coherence score

[output]
format = "Turtle"
path = "output/generated_data.ttl"
compress = false
write_stats = true
parallel_writing = false
parallel_file_count = 1

[parallel]
threads = 4
batch_size = 100
parallel_shapes = false
parallel_fields = false

[generation]
entity_count = 10000
seed = 42                              # Fixed seed for reproducibility
cardinality_strategy = "Balanced"      # Balanced cardinality

# Weighted distribution mimicking real university structure
# More students, fewer professors, some courses, etc.
[generation.entity_distribution]
Weighted = { "http://weso.es/shapes/UndergraduateStudent" = 0.25, "http://weso.es/shapes/GraduateStudent" = 0.15, "http://weso.es/shapes/Course" = 0.12, "http://weso.es/shapes/GraduateCourse" = 0.08, "http://weso.es/shapes/Department" = 0.05, "http://weso.es/shapes/University" = 0.02, "http://weso.es/shapes/FullProfessor" = 0.05, "http://weso.es/shapes/AssociateProfessor" = 0.06, "http://weso.es/shapes/AssistantProfessor" = 0.06, "http://weso.es/shapes/Lecturer" = 0.04, "http://weso.es/shapes/TeachingAssistant" = 0.04, "http://weso.es/shapes/ResearchAssistant" = 0.03, "http://weso.es/shapes/ResearchGroup" = 0.02, "http://weso.es/shapes/Publication" = 0.03 }

[field_generators.default]
locale = "en"
quality = "Medium"

# Required datatypes section
[field_generators.datatypes."http://www.w3.org/2001/XMLSchema#string"]
generator = "string"
parameters = {}

[field_generators.datatypes."http://www.w3.org/2001/XMLSchema#integer"]
generator = "integer"
[field_generators.datatypes."http://www.w3.org/2001/XMLSchema#integer".parameters]
min = 1
max = 10000

# LUBM-specific property generators
[field_generators.properties."http://www.lehigh.edu/~yug2/Research/SemanticWeb/LUBM/univ-bench.owl#name"]
generator = "string"
parameters = {}

[field_generators.properties."http://www.lehigh.edu/~yug2/Research/SemanticWeb/LUBM/univ-bench.owl#emailAddress"]
generator = "string"
parameters = {}

[field_generators.properties."http://www.lehigh.edu/~yug2/Research/SemanticWeb/LUBM/univ-bench.owl#telephone"]
generator = "string"
parameters = {}

[field_generators.properties."http://www.lehigh.edu/~yug2/Research/SemanticWeb/LUBM/univ-bench.owl#researchInterest"]
generator = "string"
parameters = {}
