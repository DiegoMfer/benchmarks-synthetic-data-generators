# Low Coherence Configuration for RUDOF Generate Benchmark
# ============================================================================
# LOW COHERENCE: Only required properties are filled, optional properties are
# skipped. This creates sparse, unstructured data where properties vary 
# significantly between instances of the same type. Mimics real-world LOD
# data (e.g., DBpedia) with coherence ≈ 0.
# ============================================================================

[output]
format = "Turtle"
path = "output/generated_data.ttl"
compress = false
write_stats = true
parallel_writing = false
parallel_file_count = 1

[parallel]
threads = 8
batch_size = 100
parallel_shapes = true
parallel_fields = true

[generation]
entity_count = 150000                  # Number of entities to generate
seed = 42                             # Fixed seed for reproducibility
cardinality_strategy = "Minimum"      # LOW COHERENCE: Only REQUIRED properties
                                      # This ensures instances have minimal property
                                      # coverage, maximizing sparsity

# Coherence Settings
property_fill_probability = 0.35      # Only fill ~35% of possible properties
ignore_min_cardinality = true         # Allow skipping required properties
max_properties_per_instance = 6       # Hard cap on properties per instance
property_selection_strategy = "Random"# Randomly select properties to keep
property_count_variance = 0.7         # High variance in property counts


entity_distribution = "Equal"         # Equal distribution ensures consistent entity count (20k) for comparison

[field_generators.default]
locale = "en"
quality = "Low"                       # Low quality = minimal, basic data

# ============================================================================
# Minimal property generators - only essential datatypes
# Keep configuration sparse to match low coherence intent
# ============================================================================

[field_generators.datatypes."http://www.w3.org/2001/XMLSchema#integer"]
generator = "integer"
[field_generators.datatypes."http://www.w3.org/2001/XMLSchema#integer".parameters]
min = 1
max = 1000

[field_generators.datatypes."http://www.w3.org/2001/XMLSchema#string"]
generator = "string"
parameters = {}

# Note: Fewer property-specific generators defined here compared to high coherence
# This further reduces uniformity across instances
