version: '3.8'

services:
  rudofgenerate:
    build: .
    container_name: rudofgenerate-binary-benchmark
    volumes:
      - ./output:/app/output
      - ./${CONFIG_FILE:-benchmark_config.toml}:/app/${CONFIG_FILE:-benchmark_config.toml}
      - ./${SCHEMA_FILE:-example_schema.shex}:/app/${SCHEMA_FILE:-example_schema.shex}
    environment:
      - PYTHONUNBUFFERED=1
      - CONFIG_FILE=${CONFIG_FILE:-benchmark_config.toml}
      - SCHEMA_FILE=${SCHEMA_FILE:-example_schema.shex}
    command: ["--schema", "${SCHEMA_FILE:-example_schema.shex}", "--config", "${CONFIG_FILE:-benchmark_config.toml}", "--output-dir", "output", "--output-format", "turtle"]
