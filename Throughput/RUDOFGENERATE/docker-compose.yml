version: '3.8'

services:
  rudofgenerate:
    build: .
    container_name: rudofgenerate-binary-benchmark
    volumes:
      - ./output:/app/output
    environment:
      - PYTHONUNBUFFERED=1
    command: ["--schema", "example_schema.shex", "--entity-count", "100", "--output-dir", "output", "--output-format", "turtle", "--seed", "42", "--parallel-threads", "4"]
