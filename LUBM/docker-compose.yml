version: '3.8'

services:
  lubm-benchmark:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lubm-generator
    volumes:
      # Mount the output directory to a relative path
      - ./output:/app/output
    environment:
      - PYTHONUNBUFFERED=1
    # Command is passed via docker compose run, default removed to allow override
