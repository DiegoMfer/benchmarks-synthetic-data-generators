strict_parsing: false

seed_graph:
  file: seed.ttl
  type: rdf

output_graph:
  file: output/mutated.ttl
  overwrite: true
  type: rdf

number_of_mutations: 200  # Apply 200 mutations per graph (increased from 50)
number_of_mutants: 50     # Generate 50 different graphs (increased from 10)

mutation_operators:
  - resource:
      file: addRelation.ttl
      syntax: swrl
  - resource:
      file: addEmploymentRelation.ttl
      syntax: swrl
  - resource:
      file: addColleagueRelation.ttl
      syntax: swrl
  - resource:
      file: addKnowsRelation.ttl
      syntax: swrl

print_summary: true
